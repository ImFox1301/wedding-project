<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Свадебное приглашение</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="invite-body">
  <header>
    <a class="logo" href="/">💍 Свадьба</a>
  </header>

  <main>
    <div class="login-wrap">
      <div class="login-card">
        <h2 style="text-align:center">Вход</h2>
        <p class="login-sub">Войдите, чтобы открыть приглашение</p>
        <div id="alert-container"></div>
        <form id="login-form">
          <div class="form-group">
            <label>Логин</label>
            <input type="text" class="form-control" id="login" autocomplete="username" required>
          </div>
          <div class="form-group">
            <label>Пароль</label>
            <input type="password" class="form-control" id="password" autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%">Войти</button>
        </form>
      </div>
    </div>
  </main>

  <footer>
    <p>Свадебное приглашение</p>
  </footer>

  <script src="/js/api.js"></script>
  <script>
    // If already logged in, redirect
    if (getToken()) {
      if (getRole() === 'admin') window.location.href = '/admin/';
      else window.location.href = '/invite.html';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const login = document.getElementById('login').value.trim();
      const password = document.getElementById('password').value;
      try {
        const data = await api.login(login, password);
        setAuth(data.token, data.role, data.guest_id);
        if (data.role === 'admin') {
          window.location.href = '/admin/';
        } else {
          window.location.href = '/invite.html';
        }
      } catch (err) {
        showAlert(document.getElementById('alert-container'), err.message, 'danger');
      }
    });
  </script>
</body>
</html>

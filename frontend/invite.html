<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Приглашение</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/theme.js"></script>
</head>
<body class="invite-body">
  <header>
    <a class="logo" href="#">💍 Свадьба</a>
    <div class="user-info">
      <span id="guest-name-header"></span>
      <button class="btn-logout" onclick="logout()">Выйти</button>
    </div>
  </header>

  <div id="page-content">
    <div class="page-status">Загрузка приглашения...</div>
  </div>

  <!-- Music FAB -->
  <audio id="audio-el" preload="none"></audio>

  <div id="music-fab-wrap" class="hidden">
    <!-- FAB toggle button -->
    <button id="music-fab-btn" onclick="toggleMusicWidget()" aria-label="Плеер">
      <svg viewBox="0 0 24 24" width="23" height="23" fill="currentColor" aria-hidden="true">
        <path d="M20 3.5a1 1 0 0 0-1.2-.98l-9 1.8A1 1 0 0 0 9 5.3v9.2A3.5 3.5 0 1 0 11 17.5V9.32l7-1.4v4.08A3.5 3.5 0 1 0 20 15V3.5z"/>
      </svg>
    </button>

    <!-- Widget panel (Apple Music style) -->
    <div id="music-widget" class="hidden">
      <!-- Now playing -->
      <div id="music-np">
        <div id="music-np-art"><span class="np-note">♪</span></div>
        <div id="music-np-meta">
          <div id="music-current-name">—</div>
          <div id="music-current-artist"></div>
        </div>
        <div id="music-volume">
          <div id="vol-slider-wrap">
            <input type="range" id="vol-slider" min="0" max="100" value="30" aria-label="Громкость">
            <span id="vol-pct">30%</span>
          </div>
          <button id="vol-btn" type="button" aria-label="Звук" title="Громкость">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
              <path d="M4 9v6h4l5 5V4L8 9H4zm11.5 3a3.5 3.5 0 0 0-2-3.15v6.3A3.5 3.5 0 0 0 15.5 12z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Scrubber -->
      <div id="music-scrubber">
        <div id="music-progress-bar"><div id="music-progress-fill"></div></div>
        <div class="music-times">
          <span id="music-time-cur">0:00</span>
          <span id="music-time-dur">0:00</span>
        </div>
      </div>

      <!-- Transport -->
      <div id="music-btns">
        <button class="mc-side" onclick="prevTrack()" aria-label="Предыдущий">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button id="play-btn" onclick="togglePlay()" aria-label="Играть">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="mc-side" onclick="nextTrack()" aria-label="Следующий">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true"><path d="M16 6h2v12h-2zM6 18l8.5-6L6 6z"/></svg>
        </button>
      </div>

      <!-- Playlist -->
      <div id="music-list-header">Плейлист</div>
      <div id="music-track-list"></div>
    </div>
  </div>

  <!-- Chat FAB (bottom-left) -->
  <div id="chat-fab-wrap" class="hidden">
    <button id="chat-fab-btn" onclick="toggleChat()" aria-label="Чат гостей">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor" aria-hidden="true">
        <path d="M4 4h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H9l-5 4v-4H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/>
      </svg>
      <span id="chat-badge" class="hidden">0</span>
    </button>

    <div id="chat-panel" class="hidden">
      <div id="chat-header">
        <span>💬 Чат гостей</span>
        <button onclick="toggleChat()" aria-label="Закрыть">&times;</button>
      </div>
      <div id="chat-info">Чат общий для всех гостей вашей категории и виден организаторам. Чаты для друзей и родственников — раздельные.</div>
      <div id="chat-messages"></div>
      <form id="chat-form" autocomplete="off">
        <input id="chat-input" placeholder="Написать сообщение…" maxlength="2000" autocomplete="off">
        <button type="submit" aria-label="Отправить">➤</button>
      </form>
    </div>
  </div>

  <footer id="page-footer"><p>С любовью ❤️</p></footer>

  <!-- Gift photo modal -->
  <div id="gift-photo-modal"
    style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.8);
           align-items:center;justify-content:center;cursor:pointer"
    onclick="closeGiftPhoto()">
    <div style="position:relative;max-width:92vw;max-height:92vh" onclick="event.stopPropagation()">
      <button onclick="closeGiftPhoto()"
        style="position:absolute;top:-36px;right:0;background:none;border:none;
               color:#fff;font-size:28px;line-height:1;cursor:pointer">&times;</button>
      <img id="gift-photo-img" src="" alt="Фото подарка"
        style="max-width:92vw;max-height:92vh;display:block;border-radius:8px;object-fit:contain">
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/daterange.js"></script>
  <script>
    // ──────────────────────────────────────────────
    // AUTH
    // ──────────────────────────────────────────────
    function logout() { clearAuth(); window.location.href = '/login.html'; }

    // ──────────────────────────────────────────────
    // TEMPLATE
    // ──────────────────────────────────────────────
    function escapeHtml(s) {
      return (s || '').replace(/[&<>"']/g, m => (
        { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]
      ));
    }

    function applyTemplate(text, guests) {
      if (!guests || !guests.length) return text;
      const g = guests[0];
      return text
        .replace(/\{\{first_name\}\}/g,  g.first_name  || '')
        .replace(/\{\{last_name\}\}/g,   g.last_name   || '')
        .replace(/\{\{middle_name\}\}/g, g.middle_name || '')
        .replace(/\{\{full_name\}\}/g,   [g.last_name, g.first_name, g.middle_name].filter(Boolean).join(' '));
    }

    // Render section content — handles both HTML (WYSIWYG) and legacy plain text
    function renderContent(content, guests) {
      if (!content) return '';
      const s = applyTemplate(content, guests);
      return s.trim().startsWith('<') ? s : s.replace(/\n/g, '<br>');
    }

    // ──────────────────────────────────────────────
    // DATE FORMAT
    // ──────────────────────────────────────────────
    function formatDateRu(str) {
      if (!str) return 'не задана';
      const d = new Date(str + 'T00:00:00');
      return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    // ──────────────────────────────────────────────
    // SALUTATION
    // ──────────────────────────────────────────────
    // Group patterns: {{first_names}} / {{last_names}} / {{full_names}}
    function joinNames(arr) {
      arr = arr.filter(Boolean);
      if (arr.length <= 1) return arr.join('');
      return arr.slice(0, -1).join(', ') + ' и ' + arr[arr.length - 1];
    }
    function applyGroupTemplate(text, guests) {
      return text
        .replace(/\{\{first_names\}\}/g, joinNames(guests.map(g => g.first_name)))
        .replace(/\{\{last_names\}\}/g,  joinNames(guests.map(g => g.last_name)))
        .replace(/\{\{full_names\}\}/g,  joinNames(guests.map(g => [g.last_name, g.first_name, g.middle_name].filter(Boolean).join(' '))));
    }

    function buildSalutation(guests, groupSalutation) {
      if (!guests || !guests.length) return 'Дорогой гость';

      // Group link — custom template if set, else classic "Дорогие А и Б"
      if (guests.length > 1) {
        if (groupSalutation && groupSalutation.trim()) {
          return applyGroupTemplate(groupSalutation.trim(), guests);
        }
        const names = guests.map(g => g.first_name);
        const nameStr = names.length === 2
          ? names[0] + ' и ' + names[1]
          : names.slice(0, -1).join(', ') + ' и ' + names[names.length - 1];
        return `Дорогие ${nameStr}`;
      }

      // Single guest
      const g = guests[0];
      if (g.custom_salutation && g.custom_salutation.trim()) {
        // Custom: support {{first_name}} etc., name is NOT auto-appended
        return applyTemplate(g.custom_salutation.trim(), guests);
      }
      // Default: salutation word + first name (old behaviour)
      const word = g.gender === 'female' ? 'Дорогая' : 'Дорогой';
      return `${word} ${g.first_name}`;
    }

    // ──────────────────────────────────────────────
    // MUSIC FAB
    // ──────────────────────────────────────────────
    let tracks = [], trackIdx = 0, playing = false;
    const PLAY_SVG  = '<svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>';
    const PAUSE_SVG = '<svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>';
    const audioEl   = document.getElementById('audio-el');
    const playBtn   = document.getElementById('play-btn');
    const fabWrap   = document.getElementById('music-fab-wrap');
    const widget    = document.getElementById('music-widget');
    const trackList = document.getElementById('music-track-list');
    const curName   = document.getElementById('music-current-name');
    const curArtist = document.getElementById('music-current-artist');
    const npArt     = document.getElementById('music-np-art');
    const progFill  = document.getElementById('music-progress-fill');
    const timeCur   = document.getElementById('music-time-cur');
    const timeDur   = document.getElementById('music-time-dur');

    // Colorful "album art" placeholder, deterministic per track index
    function artGradient(i) {
      const h = (i * 63) % 360;
      return `linear-gradient(135deg, hsl(${h}, 62%, 64%), hsl(${(h + 38) % 360}, 66%, 46%))`;
    }

    function fmtTime(s) {
      if (!isFinite(s)) return '0:00';
      const m = Math.floor(s / 60), ss = Math.floor(s % 60);
      return m + ':' + String(ss).padStart(2, '0');
    }

    function parseTrackName(raw) {
      const clean = raw.replace(/\.[^/.]+$/, ''); // strip extension
      const sep = clean.indexOf(' - ');
      if (sep > -1) return { title: clean.slice(sep + 3).trim(), artist: clean.slice(0, sep).trim() };
      return { title: clean, artist: '' };
    }

    function getTrackMeta(t) {
      // Prefer DB-stored ID3 tags; fall back to filename parsing
      if (t.title) return { title: t.title, artist: t.artist || '' };
      return parseTrackName(t.original_name || t.filename);
    }

    function renderTrackList() {
      trackList.innerHTML = tracks.map((t, i) => {
        const { title, artist } = getTrackMeta(t);
        const isActive = i === trackIdx;
        const cls = 'music-track-item' + (isActive ? ' music-track-active' : '');
        const overlay = (isActive && playing)
          ? '<span class="eq"><i></i><i></i><i></i></span>'
          : '<span class="mt-note">♪</span>';
        return `<div class="${cls}" onclick="loadTrack(${i});startPlay()">
          <div class="mt-art" style="background:${artGradient(i)}">${overlay}</div>
          <div class="music-track-text">
            <span class="music-track-title">${title}</span>
            ${artist ? `<span class="music-track-artist">${artist}</span>` : ''}
          </div>
        </div>`;
      }).join('');
    }

    function updateControls() {
      const t = tracks[trackIdx];
      if (!t) return;
      const meta = getTrackMeta(t);
      curName.textContent = meta.title;
      if (curArtist) curArtist.textContent = meta.artist || 'Неизвестный исполнитель';
      if (npArt) npArt.style.background = artGradient(trackIdx);
      playBtn.innerHTML = playing ? PAUSE_SVG : PLAY_SVG;
      playBtn.classList.toggle('is-playing', playing);
      // Pulse the FAB while playing — visible whether the widget is open or not.
      const fabBtn = document.getElementById('music-fab-btn');
      if (fabBtn) fabBtn.classList.toggle('music-fab-playing', playing);
      renderTrackList();
      // Scroll active track into view
      const active = trackList.querySelector('.music-track-active');
      if (active) active.scrollIntoView({ block: 'nearest' });
    }

    function loadTrack(idx) {
      if (!tracks.length) return;
      trackIdx = (idx + tracks.length) % tracks.length;
      audioEl.src = '/uploads/' + tracks[trackIdx].filename;
      if (playing) audioEl.play();
      updateControls();
    }

    function startPlay() {
      if (!tracks.length) return;
      if (!audioEl.src || audioEl.src === window.location.href) loadTrack(0);
      audioEl.play(); playing = true; updateControls();
    }

    function togglePlay() {
      if (!tracks.length) return;
      if (playing) { audioEl.pause(); playing = false; updateControls(); }
      else { startPlay(); }
    }

    function nextTrack() { loadTrack(trackIdx + 1); }
    function prevTrack() { loadTrack(trackIdx - 1); }

    audioEl.addEventListener('ended', () => loadTrack(trackIdx + 1));
    audioEl.addEventListener('timeupdate', () => {
      if (!audioEl.duration) return;
      const pct = (audioEl.currentTime / audioEl.duration) * 100;
      progFill.style.width = pct + '%';
      timeCur.textContent  = fmtTime(audioEl.currentTime);
      timeDur.textContent  = fmtTime(audioEl.duration);
    });
    // Click on progress bar to seek
    document.getElementById('music-progress-bar').addEventListener('click', function(e) {
      if (!audioEl.duration) return;
      const rect = this.getBoundingClientRect();
      audioEl.currentTime = ((e.clientX - rect.left) / rect.width) * audioEl.duration;
    });

    function toggleMusicWidget() {
      widget.classList.toggle('hidden');
    }

    // Volume: default 30%, persisted in localStorage. Slider reveals on hover
    // over the speaker icon (see #music-volume CSS).
    function setupVolume() {
      const slider = document.getElementById('vol-slider');
      const pct    = document.getElementById('vol-pct');
      const box    = document.getElementById('music-volume');
      const btn    = document.getElementById('vol-btn');
      if (!slider || !audioEl) return;
      let v = parseInt(localStorage.getItem('music_volume'));
      if (isNaN(v)) v = 30;
      v = Math.max(0, Math.min(100, v));
      const apply = val => {
        audioEl.volume = val / 100;
        slider.value   = val;
        if (pct) pct.textContent = val + '%';
        localStorage.setItem('music_volume', val);
      };
      apply(v);
      slider.addEventListener('input', () => apply(parseInt(slider.value) || 0));
      // On touch devices hover doesn't exist — tap the icon to toggle the slider.
      if (btn && box) btn.addEventListener('click', e => { e.stopPropagation(); box.classList.toggle('open'); });
    }

    async function initMusic() {
      try {
        tracks = await api.guestMusic();
        if (tracks.length) {
          fabWrap.classList.remove('hidden');
          setupVolume();
          loadTrack(0);
          // Try autoplay; browsers may block it without prior user interaction.
          // If blocked, pulse the FAB and play on first user gesture.
          try {
            await audioEl.play();
            playing = true;
            updateControls();
            renderTrackList();
          } catch (_) {
            // Autoplay blocked — wait for first interaction
            const fabBtn = document.getElementById('music-fab-btn');
            fabBtn.classList.add('music-fab-pulse');
            const resume = () => {
              startPlay();
              fabBtn.classList.remove('music-fab-pulse');
              document.removeEventListener('click', resume);
              document.removeEventListener('touchstart', resume);
            };
            document.addEventListener('click', resume, { once: true });
            document.addEventListener('touchstart', resume, { once: true });
          }
        }
      } catch {}
    }

    // ──────────────────────────────────────────────
    // GOSHA BUTTON
    // ──────────────────────────────────────────────
    function goshaBtnBehavior(btn, canPress) {
      if (canPress) {
        btn.onclick = () => { btn.textContent = '🎉 ТЫ ГОША!!!'; btn.style.background = '#27ae60'; btn.disabled = true; };
      } else {
        // Capture natural position, then re-parent to <body> so position:fixed is
        // always relative to the viewport (never a transformed/positioned ancestor),
        // and clamp into the viewport with a small safety margin.
        const M = 8; // keep-on-screen margin
        const initR = btn.getBoundingClientRect();
        const w = btn.offsetWidth, h = btn.offsetHeight;
        const clampX = x => Math.max(M, Math.min(window.innerWidth  - w - M, x));
        const clampY = y => Math.max(M, Math.min(window.innerHeight - h - M, y));
        document.body.appendChild(btn);
        btn.style.position = 'fixed';
        btn.style.margin = '0';
        btn.style.zIndex = '400';
        btn.style.left = clampX(initR.left) + 'px';
        btn.style.top  = clampY(initR.top)  + 'px';

        function flee(e) {
          const r  = btn.getBoundingClientRect();
          const mx = e.clientX || (e.touches && e.touches[0]?.clientX) || r.left + r.width/2;
          const my = e.clientY || (e.touches && e.touches[0]?.clientY) || r.top  + r.height/2;
          const dx = (r.left + r.width/2) - mx, dy = (r.top + r.height/2) - my;
          const d  = Math.sqrt(dx*dx + dy*dy) || 1;
          btn.style.left = clampX(r.left + dx/d*160) + 'px';
          btn.style.top  = clampY(r.top  + dy/d*160) + 'px';
        }
        btn.addEventListener('mousemove', flee);
        btn.addEventListener('touchmove', flee, { passive: true });
        btn.onclick = e => e.preventDefault();
      }
    }

    // ──────────────────────────────────────────────
    // GIFTS
    // ──────────────────────────────────────────────
    let gifts = [];
    let giftsContainer = null;
    // Group gift mode
    let _isGiftGroup = false;
    let _groupGuests = [];
    let _groupPicks  = {};   // guest_id → gift_id

    async function reloadGifts() {
      try { gifts = await api.guestGifts(); renderGifts(); } catch {}
    }

    // When the chat WS is live, the server echoes a `gift_update` after every
    // pick/unpick, which triggers reloadGifts() via onGiftUpdate(). In that case
    // we must NOT also reload directly, or the gift list is fetched twice.
    function chatWsConnected() { return !!(chatWs && chatWs.readyState === 1); }

    // Group gifts: the "Выбрать" button opens a selector of group members.
    function toggleGiftSelect(giftId) {
      const w = document.getElementById('gms-' + giftId);
      if (w) w.style.display = (!w.style.display || w.style.display === 'none') ? 'block' : 'none';
    }
    async function groupPick(giftId, guestVal) {
      if (!guestVal) return;
      const guestId = parseInt(guestVal);
      try { await api.saveGroupGiftPick({ guest_id: guestId, gift_id: giftId }); }
      catch (e) { showSaveStatus(false); return; }
      _groupPicks[guestId] = giftId;
      showSaveStatus(true);
      await reloadGifts();                 // refresh "занят" states + re-render
    }
    async function groupUnpick(guestId) {
      try { await api.saveGroupGiftPick({ guest_id: guestId, gift_id: null }); }
      catch (e) { showSaveStatus(false); return; }
      delete _groupPicks[guestId];
      showSaveStatus(true);
      await reloadGifts();
    }

    function renderGifts() {
      if (!giftsContainer) return;
      const pickable    = gifts.filter(g =>  g.is_pickable);
      const notPickable = gifts.filter(g => !g.is_pickable);

      let html = '';

      // Общее (non-pickable) — shown without pick controls
      if (notPickable.length) {
        html += `<h3 class="gifts-subhead">Общее</h3>
          <div class="gifts-grid mb-16">
            ${notPickable.map(g => `
              <div class="gift-card">
                <h4>${g.name}</h4>
                ${g.description ? `<div class="gift-desc">${g.description}</div>` : ''}
              </div>
            `).join('')}
          </div>`;
      }

      // Pickable gifts
      if (pickable.length) {
        if (notPickable.length) html += `<h3 class="gifts-subhead">Выберите подарок</h3>`;
        html += `<div class="gifts-grid">
          ${pickable.map(g => {
            // Photo shown directly in the card (uniform size);
            // clicking it opens the full image in the modal.
            const photoHtml = g.photo_filename
              ? `<div class="gift-photo" onclick="openGiftPhoto('/uploads/${g.photo_filename}')" title="Открыть фото">
                   <img src="/uploads/${g.photo_filename}" alt="" loading="lazy">
                 </div>`
              : '';
            const linkBtn = g.link_url
              ? `<button data-url="${escapeHtml(g.link_url)}" onclick="window.open(this.dataset.url,'_blank')">🔗 Открыть ссылку</button>`
              : '';

            let cls = 'gift-card' + (linkBtn ? ' has-actions' : '');
            let pickArea = '';

            if (_isGiftGroup) {
              // Group: choose which member(s) give this gift (several allowed
              // within the same group). A member can give only one gift.
              const givers = _groupGuests.filter(gu => String(_groupPicks[gu.id]) === String(g.id));
              const mine = givers.length > 0;
              if (mine) cls += ' picked-by-me';

              if (g.taken_external && !mine) {
                // Claimed by a single guest or another group → locked
                cls += ' picked-by-other';
                pickArea = `
                  <span class="gift-badge badge-taken">Занят</span>
                  <h4>${g.name}</h4>
                  ${g.description ? `<div class="gift-desc">${g.description}</div>` : ''}
                  ${g.giver_names ? `<div class="gift-taken-by">Выбрали: ${g.giver_names}</div>` : ''}`;
              } else {
                const chips = givers.map(gu =>
                  `<span class="giver-chip">${gu.first_name}<button type="button" onclick="groupUnpick(${gu.id})" aria-label="Убрать">×</button></span>`).join('');
                // Only members who haven't picked ANY gift yet can be added
                const avail = _groupGuests.filter(gu => _groupPicks[gu.id] == null);
                const opts = `<option value="">— кто дарит? —</option>` + avail.map(gu =>
                  `<option value="${gu.id}">${[gu.first_name, gu.last_name].filter(Boolean).join(' ')}</option>`).join('');
                pickArea = `
                  <h4>${g.name}</h4>
                  ${g.description ? `<div class="gift-desc">${g.description}</div>` : ''}
                  <div class="gift-givers">${chips || '<span class="text-muted" style="font-size:.8rem">Пока никто не выбрал</span>'}</div>
                  <button class="btn btn-success btn-sm gift-choose-btn" onclick="toggleGiftSelect(${g.id})">Выбрать</button>
                  <div class="gift-member-select-wrap" id="gms-${g.id}" style="display:none;margin-top:8px">
                    <select class="form-control" onchange="groupPick(${g.id}, this.value)">${opts}</select>
                  </div>`;
              }
            } else {
              // Single guest: classic pick / unpick (respects group claims too)
              let badge = '', pickBtn = '';
              if (g.is_my_pick) {
                cls += ' picked-by-me';
                badge   = '<span class="gift-badge badge-mine">Ваш выбор</span>';

    function openGiftPhoto(src) {

    // SECTION PHOTO ACCORDION GALLERY
    // ──────────────────────────────────────────────
    const _sgState  = {};  // sectionId → active index
    const _sgPhotos = {};  // sectionId → [{filename}]

    function buildSectionGallery(s) {
      _sgPhotos[s.id] = s.photos;
      if (!(s.id in _sgState)) _sgState[s.id] = 0;
      const idx  = _sgState[s.id];
      const cur  = s.photos[idx];
      const many = s.photos.length > 1;

      const thumbs = many ? s.photos.map((p, i) => `
        <div class="section-gallery-thumb ${i === idx ? 'active' : ''}"
             onclick="sgSetPhoto(${s.id},${i})">
          <img src="/uploads/${p.filename}" alt="" loading="lazy">
        </div>`).join('') : '';

      const dots = many ? `<div class="sg-dots" id="sg-dots-${s.id}">${
        s.photos.map((_, i) => `<span class="sg-dot ${i === idx ? 'active' : ''}" onclick="sgSetPhoto(${s.id},${i})"></span>`).join('')
      }</div>` : '';

      // Gallery is always visible when a section has photos
      return `
        <div class="section-gallery" id="sg-${s.id}">
          <div class="section-gallery-main" id="sg-stage-${s.id}">
            <img class="sg-photo active" id="sg-img-${s.id}" src="/uploads/${cur.filename}" alt="" loading="lazy">
            ${many ? `<button class="section-gallery-nav prev" onclick="sgPrev(${s.id})" aria-label="Назад">&#8249;</button>` : ''}
            <button class="section-gallery-zoom" onclick="openGiftPhoto('/uploads/${cur.filename}')"
                    id="sg-zoom-${s.id}" aria-label="Увеличить">🔍</button>
            ${many ? `<button class="section-gallery-nav next" onclick="sgNext(${s.id})" aria-label="Вперёд">&#8250;</button>` : ''}
          </div>
          ${many ? `<div class="section-gallery-thumbs">${thumbs}</div>` : ''}
          ${dots}
        </div>`;
    }

    // Animated crossfade + slide between photos
    function sgSetPhoto(sId, idx, dir) {
      const photos = _sgPhotos[sId] || [];
      if (!photos.length || idx === _sgState[sId]) return;
      const oldIdx = _sgState[sId];
      if (dir === undefined) dir = idx > oldIdx ? 1 : -1;
      _sgState[sId] = idx;

      const src   = '/uploads/' + photos[idx].filename;
      const stage = document.getElementById(`sg-stage-${sId}`);
      if (!stage) return;
      const oldImg = stage.querySelector('.sg-photo.active');

      const newImg = document.createElement('img');
      newImg.className = 'sg-photo';
      newImg.src = src;
      newImg.alt = '';
      newImg.style.transform = `translateX(${dir * 34}px)`;
      stage.insertBefore(newImg, stage.firstChild); // keep nav/zoom on top in DOM order
      void newImg.offsetWidth;                       // force reflow so transition runs

      requestAnimationFrame(() => {
        newImg.classList.add('active');
        newImg.style.transform = 'translateX(0)';
        if (oldImg) {
          oldImg.classList.remove('active');
          oldImg.style.transform = `translateX(${-dir * 34}px)`;
        }
      });
      const cleanup = () => { if (oldImg && oldImg.parentNode) oldImg.parentNode.removeChild(oldImg); };
      newImg.addEventListener('transitionend', cleanup, { once: true });
      setTimeout(cleanup, 700); // safety fallback

      newImg.id = `sg-img-${sId}`;
      if (oldImg) oldImg.removeAttribute('id');

      const zoom = document.getElementById(`sg-zoom-${sId}`);
      if (zoom) zoom.onclick = () => openGiftPhoto(src);
      document.querySelectorAll(`#sg-${sId} .section-gallery-thumb`).forEach((t, i) => t.classList.toggle('active', i === idx));
      document.querySelectorAll(`#sg-${sId} .sg-dot`).forEach((d, i) => d.classList.toggle('active', i === idx));
    }

    function sgPrev(sId) {
      const n = (_sgPhotos[sId] || []).length;
      sgSetPhoto(sId, (_sgState[sId] - 1 + n) % n, -1);
    }
    function sgNext(sId) {
      const n = (_sgPhotos[sId] || []).length;
      sgSetPhoto(sId, (_sgState[sId] + 1) % n, 1);
    }

    // FRIEND FORM AUTO-SAVE
    // ──────────────────────────────────────────────
    let friendForm       = null;
    let saveTimeout      = null;
    let cottagePickers   = {}; // guest_id → DateRangePicker
    let cottageArrivalDate = ''; // Fixed arrival date from admin settings

    function scheduleSave() {
      clearTimeout(saveTimeout);

    function showSaveStatus(ok, message) {
      let el = document.getElementById('save-status');
      if (!el) {
        el = document.createElement('div');
        el.id = 'save-status';
        el.style.cssText =
          'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);max-width:88vw;text-align:center;' +
          'padding:8px 18px;border-radius:20px;font-size:.82rem;z-index:3000;' +
          'pointer-events:none;transition:opacity .4s';
        document.body.appendChild(el);
      }
      clearTimeout(el._t);
      if (ok) {
        el.textContent = message || '✓ Сохранено';
        el.style.cssText += ';background:#dcfce7;color:#15803d;opacity:1';
      } else {
        el.textContent = message || '⚠ Не удалось сохранить';

    async function saveFriendForm() {
      if (!friendForm) return;
      const responses = [];
      document.querySelectorAll('.fr-cottage').forEach(cb => {
        const key   = cb.dataset.guest;
        const going = cb.checked;
        const picker = cottagePickers[key];
        const toDate = picker ? picker.getValue().to : '';
        const tcb   = document.querySelector(`.fr-tourn[data-guest="${key}"]`);
        const tourn = !!(tcb && tcb.checked);
        const oppSel = document.querySelector(`.fr-opp[data-guest="${key}"]`);
        const opp   = oppSel && oppSel.value ? parseInt(oppSel.value) : null;
        responses.push({
          guest_id:              parseInt(key),
          going_cottage:         going,
          cottage_date_from:     going ? (cottageArrivalDate || null) : null,
          cottage_date_to:       going ? (toDate || null)             : null,
          tournament:            tourn,
          preferred_opponent_id: tourn ? opp : null,
        });
      });
      const comment = (document.getElementById('comment-text') || {}).value || '';
      try {
        await api.saveFriend({ responses, comment });
        showSaveStatus(true);
      } catch (e) {
        console.error('saveFriend failed:', e);
        showSaveStatus(false);
      }
    }

    async function saveFamilyForm() {
      const responses = [];
      document.querySelectorAll('.loft-going').forEach(cb => {
        const gid       = parseInt(cb.dataset.guest);
        const going     = cb.checked;
        const tcb       = document.querySelector(`.loft-transport[data-guest="${cb.dataset.guest}"]`);
        const transport = going && !!(tcb && tcb.checked);
        responses.push({ guest_id: gid, going_loft: going, needs_transport: transport });
      });
      try {
        await api.saveFamily({ responses });
        showSaveStatus(true);
      } catch (e) {
        console.error('saveFamily failed:', e);

    // ──────────────────────────────────────────────
    // SCROLL REVEAL (fade-up on enter)
    // ──────────────────────────────────────────────
    function setupReveal() {
      const els = document.querySelectorAll('.invite-header, .invite-section');
      if (!('IntersectionObserver' in window)) {
        els.forEach(el => el.classList.add('reveal-in'));
        return;
      }
      const io = new IntersectionObserver((entries, obs) => {
        entries.forEach(e => {
          if (e.isIntersecting) { e.target.classList.add('reveal-in'); obs.unobserve(e.target); }
        });
      }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
      els.forEach((el, i) => {
        el.classList.add('reveal');
        el.style.setProperty('--reveal-delay', (Math.min(i, 6) * 60) + 'ms');
        io.observe(el);
      });
    }

    // CHAT
    // ──────────────────────────────────────────────
    let chatWs = null, chatOpen = false, chatUnread = 0, chatMyId = null, chatLoaded = false, chatInited = false;

    function fmtChatTime(str) {
      const d = new Date(str);
      if (isNaN(d)) return '';
      return d.toLocaleString('ru-RU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    }
    function chatIsMine(m) { return m.guest_id != null && chatMyId != null && m.guest_id === chatMyId; }
    // Real-time gift sync: refresh the gift list (and this group's picks) on update
    async function onGiftUpdate() {
      if (!giftsContainer) return;
      if (_isGiftGroup) {
        try { _groupPicks = Object.assign({}, await api.groupGiftPicks()); } catch {}
      }
      await reloadGifts();
    }
    function updateChatBadge() {
      const b = document.getElementById('chat-badge');
      if (chatUnread > 0) { b.textContent = chatUnread > 9 ? '9+' : chatUnread; b.classList.remove('hidden'); }
      else b.classList.add('hidden');
    }
    function chatMsgHtml(m) {
      const mine = chatIsMine(m);
      const cls = 'chat-msg' + (mine ? ' mine' : '') + (m.is_admin ? ' admin' : '');
      const name = mine ? '' : `<div class="chat-msg-name">${escapeHtml(m.sender_name)}</div>`;
      return `<div class="${cls}">${name}<div class="chat-msg-bubble">${escapeHtml(m.body)}</div><div class="chat-msg-time">${fmtChatTime(m.created_at)}</div></div>`;
    }
    function appendChatMsg(m) {
      const list = document.getElementById('chat-messages');
      list.insertAdjacentHTML('beforeend', chatMsgHtml(m));
      list.scrollTop = list.scrollHeight;
    }
    async function loadChatHistory() {
      try {
        const data = await api.chat.messages();
        const list = document.getElementById('chat-messages');
        list.innerHTML = (data.messages || []).map(chatMsgHtml).join('')
          || '<div class="chat-empty">Сообщений пока нет. Напишите первым!</div>';
        list.scrollTop = list.scrollHeight;
        chatLoaded = true;
      } catch {}
    }
    function connectChat() {
      if (chatWs && (chatWs.readyState === 0 || chatWs.readyState === 1)) return;
      try {
        chatWs = new WebSocket(chatWsUrl());
        chatWs.onmessage = ev => {
          let m; try { m = JSON.parse(ev.data); } catch { return; }
          if (m.type === 'gift_update') { onGiftUpdate(); return; }
          if (m.type === 'chat_reload') { if (chatLoaded) loadChatHistory(); return; }
          appendChatMsg(m);
          if (!chatOpen && !chatIsMine(m)) { chatUnread++; updateChatBadge(); }
        };
        chatWs.onclose = () => { chatWs = null; setTimeout(() => { if (getToken()) connectChat(); }, 3000); };
        chatWs.onerror = () => { try { chatWs.close(); } catch {} };
      } catch {}
    }
    async function toggleChat() {
      const panel = document.getElementById('chat-panel');
      const willOpen = panel.classList.contains('hidden');
      panel.classList.toggle('hidden');
      chatOpen = willOpen;
      if (willOpen) {
        if (!chatLoaded) await loadChatHistory();
        chatUnread = 0; updateChatBadge();
        try { await api.chat.seen(); } catch {}
        const list = document.getElementById('chat-messages');
        list.scrollTop = list.scrollHeight;
        document.getElementById('chat-input').focus();
      }
    }
    async function initChat() {
      chatMyId = parseInt(localStorage.getItem('guest_id')) || null;
      try { const u = await api.chat.unread(); chatUnread = u.count || 0; updateChatBadge(); } catch {}
      document.getElementById('chat-fab-wrap').classList.remove('hidden');
      connectChat();
      document.getElementById('chat-form').addEventListener('submit', e => {
        e.preventDefault();
        const input = document.getElementById('chat-input');
        const body = input.value.trim();
        if (!body) return;
        if (!chatWs || chatWs.readyState !== 1) { connectChat(); return; }
        chatWs.send(JSON.stringify({ body }));
        input.value = '';
      });
    }

      document.querySelectorAll('body > .gosha-btn').forEach(b => b.remove());
      const { guests, role, sections, friend_response: fr,

              family_responses: fmResponses,

              group_salutation: groupSalutation,
              cottage_date_from, cottage_date_to, page_subtitle,
              header_text, footer_text, attending,
              decline_text: declineText, labels } = data;

      // Editable checkbox labels (with fallbacks)
      const L = labels || {};
      const lbl = (k, def) => (L[k] && L[k].trim()) ? L[k] : def;

      // Store fixed arrival date for saving

          <div class="host-reply">

      if (role === 'family') {

                  <span class="option-body">
                    <span class="option-title">${lbl('label_transport_title', 'Нужен транспорт до лофта')}</span>
                    <span class="option-desc">${lbl('label_transport_desc', 'Организованный трансфер')}</span>
                  </span>
                  <input type="checkbox" class="option-input loft-transport" data-guest="${g.id}" ${transp ? 'checked' : ''}>
                  <span class="option-check"></span>
                </label>
              </div>
            </div>`;
        }).join('');

        html += `
        <div class="invite-section">
          <h2>📋 Ваши ответы</h2>
          ${multi ? '<p class="text-muted mb-16">Отметьте, пожалуйста, ответ для каждого гостя.</p>' : ''}
          <div class="rsvp-people">${peopleHtml}</div>
        </div>

        <div class="invite-section" id="gifts-section">
          <h2>🎁 Список подарков</h2>
          <p class="text-muted mb-16">Выберите подарок, который хотите подарить.</p>
          <div class="gifts-body"></div>
        </div>`;
      }

      // Discreet way to change the answer back to "Не приду" (hidden in preview)
      if (!_preview) html += `<div class="attend-change"><button onclick="setAttendance(false)">Не смогу прийти</button></div>`;

      html += `</div>`; // invite-page
      document.getElementById('page-content').innerHTML = html;

      // Entrance animations
      setupReveal();

      // ── Post-render wiring ──

      if (role === 'friends') {
        friendForm     = document.getElementById('friend-form');
        giftsContainer = document.getElementById('gifts-section');
        const isGroup  = guests.length > 1;
        const frMap    = frResponses || {};

        // Per-guest cottage pickers (fixed arrival, guest picks departure)
        cottagePickers = {};
        if (cottage_date_from) {
          document.querySelectorAll('.cottage-picker').forEach(el => {
            const gid = el.dataset.guest;
            const r   = frMap[gid] || {};
            cottagePickers[gid] = new DateRangePicker(el, {
              min:       cottage_date_from,
              max:       cottage_date_to || undefined,
              fixedFrom: cottage_date_from,
              to:        r.cottage_date_to || '',
              labelTo:   'Дата выезда',
              onChange:  () => scheduleSave(),
            });
          });
        }

        // Per-guest cottage toggle
        document.querySelectorAll('.fr-cottage').forEach(cb => {
          cb.addEventListener('change', () => {
            const w = document.querySelector(`.cottage-wrap[data-guest="${cb.dataset.guest}"]`);
            if (w) w.style.display = cb.checked ? 'block' : 'none';
            scheduleSave();
          });
        });

        // Per-guest tournament toggle
        document.querySelectorAll('.fr-tourn').forEach(cb => {
          cb.addEventListener('change', () => {
            const w = document.querySelector(`.opp-wrap[data-guest="${cb.dataset.guest}"]`);
            if (w) w.style.display = cb.checked ? 'block' : 'none';
            scheduleSave();
          });
        });

        // Opponent selects (all friends, excluding that guest)
        try {
          const friends = await api.friendsList(true);
          document.querySelectorAll('.fr-opp').forEach(sel => {
            const gid = parseInt(sel.dataset.guest);
            const r   = frMap[sel.dataset.guest] || {};
            friends.filter(f => f.id !== gid).forEach(f => {
              const opt = document.createElement('option');
              opt.value = f.id;
              opt.textContent = [f.last_name, f.first_name, f.middle_name].filter(Boolean).join(' ');
              if (r.preferred_opponent_id === f.id) opt.selected = true;
              sel.appendChild(opt);
            });
            sel.addEventListener('change', scheduleSave);
          });
        } catch {}

        document.getElementById('comment-text').addEventListener('input', scheduleSave);

        // Gifts: group → member selector on cards; single guest → classic cards
        _isGiftGroup = isGroup;
        _groupGuests = guests;
        _groupPicks  = Object.assign({}, groupGiftPicks || {});
        await reloadGifts();

        // Gosha button
        goshaBtnBehavior(document.getElementById('gosha-btn'), guests.some(g => g.am_i_gosha));
      }

      if (role === 'family') {
        // Per-guest loft toggle reveals that guest's transport option
        document.querySelectorAll('.loft-going').forEach(cb => {
          cb.addEventListener('change', () => {
            const tw = document.querySelector(`.transport-wrap[data-guest="${cb.dataset.guest}"]`);
            if (tw) tw.style.display = cb.checked ? 'block' : 'none';
            saveFamilyForm();
          });
        });
        document.querySelectorAll('.loft-transport').forEach(cb =>
          cb.addEventListener('change', saveFamilyForm));

        // Gifts for family (display only — never group picks)
        _isGiftGroup = false;
        giftsContainer = document.getElementById('gifts-section');
        await reloadGifts();
      }

      // Music + chat (init once; live outside page-content, survive re-renders).
      // Skipped in preview — no autoplay, no live chat websocket for the admin.
      if (!_preview && getToken() && !musicInited) { musicInited = true; await initMusic(); }
      if (!_preview && getToken() && !chatInited)  { chatInited  = true; await initChat();  }
    }

    // Fixed banner shown in preview mode so it's obvious this isn't the live page.
    function showPreviewBanner() {
      if (document.getElementById('preview-banner')) return;
      const bar = document.createElement('div');
      bar.id = 'preview-banner';
      bar.innerHTML = '👁 Режим предпросмотра — гость это не увидит. Взаимодействие отключено, посещение не засчитывается.'
        + '<button onclick="window.close()">Закрыть</button>';
      document.body.appendChild(bar);
      document.body.classList.add('has-preview-banner');
    }

    // ──────────────────────────────────────────────
    // INIT
    // ──────────────────────────────────────────────
    async function init() {
      const params = new URLSearchParams(window.location.search);
      const token  = params.get('token');
      _preview     = params.get('preview') === '1';

      // ── Admin preview ──
      // Renders exactly what the guest sees, but read-only: no visit is recorded,
      // interaction is blocked, and "Приду/Не приду" is removed. Uses the admin
      // session already present in localStorage to authorize the preview fetch.
      if (token && _preview) {
        const logoutBtn = document.querySelector('.btn-logout');
        if (logoutBtn) logoutBtn.style.display = 'none';
        try {
          const data = await api.invitePreview(token);
          if (data.error) {
            document.getElementById('page-content').innerHTML =
              `<div class="page-status error">${data.error}</div>`;
            return;
          }
          // Confine the guest read-token to THIS tab so the admin session in
          // other tabs is never overwritten. Enables read-only calls (gifts).
          if (data.guest_token) sessionStorage.setItem('token', data.guest_token);
          await renderPage(data);
          showPreviewBanner();
          // Block ALL interaction while keeping the page scrollable.
          const pc = document.getElementById('page-content');
          if (pc) { pc.inert = true; pc.style.pointerEvents = 'none'; pc.style.userSelect = 'none'; }
        } catch (err) {
          document.getElementById('page-content').innerHTML =
            `<div class="page-status error">Ошибка предпросмотра: ${err.message}</div>`;
        }
        return;
      }

      if (token) {
        // Public token — open without login. Guests invited by link have no
        // account to sign out of, so hide the logout button.
        const logoutBtn = document.querySelector('.btn-logout');
        if (logoutBtn) logoutBtn.style.display = 'none';
        try {
          const data = await api.invite(token);
          if (data.error) {
            document.getElementById('page-content').innerHTML =
              `<div class="page-status error">${data.error}</div>`;
            return;
          }
          // Store guest JWT so authenticated API calls (gifts, forms) work correctly
          if (data.guest_token) {
            setAuth(data.guest_token, data.role, data.guest_id);
          }
          await renderPage(data);
        } catch (err) {
          document.getElementById('page-content').innerHTML =
            `<div class="page-status error">Ошибка: ${err.message}</div>`;
        }
      } else {
        requireGuest();
        document.getElementById('page-content').innerHTML = `
          <div class="page-status">
            <p>Используйте ссылку-приглашение, отправленную вам.</p>
          </div>`;
      }
    }

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Приглашение</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap&subset=cyrillic,latin">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="invite-body">
  <header>
    <a class="logo" href="#">💍 Свадьба</a>
    <div class="user-info">
      <span id="guest-name-header"></span>
      <button class="btn-logout" onclick="logout()">Выйти</button>
    </div>
  </header>

  <div id="page-content">
    <div style="text-align:center;padding:60px;color:#888">Загрузка приглашения...</div>
  </div>

  <!-- Music FAB -->
  <audio id="audio-el" preload="none"></audio>

  <div id="music-fab-wrap" class="hidden">
    <!-- FAB toggle button -->
    <button id="music-fab-btn" onclick="toggleMusicWidget()" aria-label="Плеер">
      <svg viewBox="0 0 24 24" width="23" height="23" fill="currentColor" aria-hidden="true">
        <path d="M20 3.5a1 1 0 0 0-1.2-.98l-9 1.8A1 1 0 0 0 9 5.3v9.2A3.5 3.5 0 1 0 11 17.5V9.32l7-1.4v4.08A3.5 3.5 0 1 0 20 15V3.5z"/>
      </svg>
    </button>

    <!-- Widget panel (Apple Music style) -->
    <div id="music-widget" class="hidden">
      <!-- Now playing -->
      <div id="music-np">
        <div id="music-np-art"><span class="np-note">♪</span></div>
        <div id="music-np-meta">
          <div id="music-current-name">—</div>
          <div id="music-current-artist"></div>
        </div>
      </div>

      <!-- Scrubber -->
      <div id="music-scrubber">
        <div id="music-progress-bar"><div id="music-progress-fill"></div></div>
        <div class="music-times">
          <span id="music-time-cur">0:00</span>
          <span id="music-time-dur">0:00</span>
        </div>
      </div>

      <!-- Transport -->
      <div id="music-btns">
        <button class="mc-side" onclick="prevTrack()" aria-label="Предыдущий">⏮</button>
        <button id="play-btn" onclick="togglePlay()" aria-label="Играть">▶</button>
        <button class="mc-side" onclick="nextTrack()" aria-label="Следующий">⏭</button>
      </div>

      <!-- Playlist -->
      <div id="music-list-header">Плейлист</div>
      <div id="music-track-list"></div>
    </div>
  </div>

  <footer id="page-footer"><p>С любовью ❤️</p></footer>

  <!-- Gift photo modal -->
  <div id="gift-photo-modal"
    style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.8);
           align-items:center;justify-content:center;cursor:pointer"
    onclick="closeGiftPhoto()">
    <div style="position:relative;max-width:92vw;max-height:92vh" onclick="event.stopPropagation()">
      <button onclick="closeGiftPhoto()"
        style="position:absolute;top:-36px;right:0;background:none;border:none;
               color:#fff;font-size:28px;line-height:1;cursor:pointer">&times;</button>
      <img id="gift-photo-img" src="" alt="Фото подарка"
        style="max-width:92vw;max-height:92vh;display:block;border-radius:8px;object-fit:contain">
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/daterange.js"></script>
  <script>
    // ──────────────────────────────────────────────
    // AUTH
    // ──────────────────────────────────────────────
    function logout() { clearAuth(); window.location.href = '/login.html'; }

    // ──────────────────────────────────────────────
    // TEMPLATE
    // ──────────────────────────────────────────────
    function escapeHtml(s) {
      return (s || '').replace(/[&<>"']/g, m => (
        { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]
      ));
    }

    function applyTemplate(text, guests) {
      if (!guests || !guests.length) return text;
      const g = guests[0];
      return text
        .replace(/\{\{first_name\}\}/g,  g.first_name  || '')
        .replace(/\{\{last_name\}\}/g,   g.last_name   || '')
        .replace(/\{\{middle_name\}\}/g, g.middle_name || '')
        .replace(/\{\{full_name\}\}/g,   [g.last_name, g.first_name, g.middle_name].filter(Boolean).join(' '));
    }

    // Render section content — handles both HTML (WYSIWYG) and legacy plain text
    function renderContent(content, guests) {
      if (!content) return '';
      const s = applyTemplate(content, guests);
      return s.trim().startsWith('<') ? s : s.replace(/\n/g, '<br>');
    }

    // ──────────────────────────────────────────────
    // DATE FORMAT
    // ──────────────────────────────────────────────
    function formatDateRu(str) {
      if (!str) return 'не задана';
      const d = new Date(str + 'T00:00:00');
      return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    // ──────────────────────────────────────────────
    // SALUTATION
    // ──────────────────────────────────────────────
    function buildSalutation(guests) {
      if (!guests || !guests.length) return 'Дорогой гость';

      // Group link — always classic "Дорогие А и Б" regardless of custom salutation
      if (guests.length > 1) {
        const names = guests.map(g => g.first_name);
        const nameStr = names.length === 2
          ? names[0] + ' и ' + names[1]
          : names.slice(0, -1).join(', ') + ' и ' + names[names.length - 1];
        return `Дорогие ${nameStr}`;
      }

      // Single guest
      const g = guests[0];
      if (g.custom_salutation && g.custom_salutation.trim()) {
        // Custom: support {{first_name}} etc., name is NOT auto-appended
        return applyTemplate(g.custom_salutation.trim(), guests);
      }
      // Default: salutation word + first name (old behaviour)
      const word = g.gender === 'female' ? 'Дорогая' : 'Дорогой';
      return `${word} ${g.first_name}`;
    }

    // ──────────────────────────────────────────────
    // MUSIC FAB
    // ──────────────────────────────────────────────
    let tracks = [], trackIdx = 0, playing = false;
    const audioEl   = document.getElementById('audio-el');
    const playBtn   = document.getElementById('play-btn');
    const fabWrap   = document.getElementById('music-fab-wrap');
    const widget    = document.getElementById('music-widget');
    const trackList = document.getElementById('music-track-list');
    const curName   = document.getElementById('music-current-name');
    const curArtist = document.getElementById('music-current-artist');
    const npArt     = document.getElementById('music-np-art');
    const progFill  = document.getElementById('music-progress-fill');
    const timeCur   = document.getElementById('music-time-cur');
    const timeDur   = document.getElementById('music-time-dur');

    // Colorful "album art" placeholder, deterministic per track index
    function artGradient(i) {
      const h = (i * 63) % 360;
      return `linear-gradient(135deg, hsl(${h}, 62%, 64%), hsl(${(h + 38) % 360}, 66%, 46%))`;
    }

    function fmtTime(s) {
      if (!isFinite(s)) return '0:00';
      const m = Math.floor(s / 60), ss = Math.floor(s % 60);
      return m + ':' + String(ss).padStart(2, '0');
    }

    function parseTrackName(raw) {
      const clean = raw.replace(/\.[^/.]+$/, ''); // strip extension
      const sep = clean.indexOf(' - ');
      if (sep > -1) return { title: clean.slice(sep + 3).trim(), artist: clean.slice(0, sep).trim() };
      return { title: clean, artist: '' };
    }

    function getTrackMeta(t) {
      // Prefer DB-stored ID3 tags; fall back to filename parsing
      if (t.title) return { title: t.title, artist: t.artist || '' };
      return parseTrackName(t.original_name || t.filename);
    }

    function renderTrackList() {
      trackList.innerHTML = tracks.map((t, i) => {
        const { title, artist } = getTrackMeta(t);
        const isActive = i === trackIdx;
        const cls = 'music-track-item' + (isActive ? ' music-track-active' : '');
        const overlay = (isActive && playing)
          ? '<span class="eq"><i></i><i></i><i></i></span>'
          : '<span class="mt-note">♪</span>';
        return `<div class="${cls}" onclick="loadTrack(${i});startPlay()">
          <div class="mt-art" style="background:${artGradient(i)}">${overlay}</div>
          <div class="music-track-text">
            <span class="music-track-title">${title}</span>
            ${artist ? `<span class="music-track-artist">${artist}</span>` : ''}
          </div>
        </div>`;
      }).join('');
    }

    function updateControls() {
      const t = tracks[trackIdx];
      if (!t) return;
      const meta = getTrackMeta(t);
      curName.textContent = meta.title;
      if (curArtist) curArtist.textContent = meta.artist || 'Неизвестный исполнитель';
      if (npArt) npArt.style.background = artGradient(trackIdx);
      playBtn.textContent = playing ? '⏸' : '▶';
      playBtn.classList.toggle('is-playing', playing);
      renderTrackList();
      // Scroll active track into view
      const active = trackList.querySelector('.music-track-active');
      if (active) active.scrollIntoView({ block: 'nearest' });
    }

    function loadTrack(idx) {
      if (!tracks.length) return;
      trackIdx = (idx + tracks.length) % tracks.length;
      audioEl.src = '/uploads/' + tracks[trackIdx].filename;
      if (playing) audioEl.play();
      updateControls();
    }

    function startPlay() {
      if (!tracks.length) return;
      if (!audioEl.src || audioEl.src === window.location.href) loadTrack(0);
      audioEl.play(); playing = true; updateControls();
    }

    function togglePlay() {
      if (!tracks.length) return;
      if (playing) { audioEl.pause(); playing = false; updateControls(); }
      else { startPlay(); }
    }

    function nextTrack() { loadTrack(trackIdx + 1); }
    function prevTrack() { loadTrack(trackIdx - 1); }

    audioEl.addEventListener('ended', () => loadTrack(trackIdx + 1));
    audioEl.addEventListener('timeupdate', () => {
      if (!audioEl.duration) return;
      const pct = (audioEl.currentTime / audioEl.duration) * 100;
      progFill.style.width = pct + '%';
      timeCur.textContent  = fmtTime(audioEl.currentTime);
      timeDur.textContent  = fmtTime(audioEl.duration);
    });
    // Click on progress bar to seek
    document.getElementById('music-progress-bar').addEventListener('click', function(e) {
      if (!audioEl.duration) return;
      const rect = this.getBoundingClientRect();
      audioEl.currentTime = ((e.clientX - rect.left) / rect.width) * audioEl.duration;
    });

    function toggleMusicWidget() {
      widget.classList.toggle('hidden');
    }

    async function initMusic() {
      try {
        tracks = await api.guestMusic();
        if (tracks.length) {
          fabWrap.classList.remove('hidden');
          loadTrack(0);
          // Try autoplay; browsers may block it without prior user interaction.
          // If blocked, pulse the FAB and play on first user gesture.
          try {
            await audioEl.play();
            playing = true;
            updateControls();
            renderTrackList();
          } catch (_) {
            // Autoplay blocked — wait for first interaction
            const fabBtn = document.getElementById('music-fab-btn');
            fabBtn.classList.add('music-fab-pulse');
            const resume = () => {
              startPlay();
              fabBtn.classList.remove('music-fab-pulse');
              document.removeEventListener('click', resume);
              document.removeEventListener('touchstart', resume);
            };
            document.addEventListener('click', resume, { once: true });
            document.addEventListener('touchstart', resume, { once: true });
          }
        }
      } catch {}
    }

    // ──────────────────────────────────────────────
    // GOSHA BUTTON
    // ──────────────────────────────────────────────
    function goshaBtnBehavior(btn, canPress) {
      if (canPress) {
        btn.onclick = () => { btn.textContent = '🎉 ТЫ ГОША!!!'; btn.style.background = '#27ae60'; btn.disabled = true; };
      } else {
        // Capture natural position, then re-parent to <body> so position:fixed is
        // always relative to the viewport (never a transformed/positioned ancestor),
        // and clamp into the viewport with a small safety margin.
        const M = 8; // keep-on-screen margin
        const initR = btn.getBoundingClientRect();
        const w = btn.offsetWidth, h = btn.offsetHeight;
        const clampX = x => Math.max(M, Math.min(window.innerWidth  - w - M, x));
        const clampY = y => Math.max(M, Math.min(window.innerHeight - h - M, y));
        document.body.appendChild(btn);
        btn.style.position = 'fixed';
        btn.style.margin = '0';
        btn.style.zIndex = '400';
        btn.style.left = clampX(initR.left) + 'px';
        btn.style.top  = clampY(initR.top)  + 'px';

        function flee(e) {
          const r  = btn.getBoundingClientRect();
          const mx = e.clientX || (e.touches && e.touches[0]?.clientX) || r.left + r.width/2;
          const my = e.clientY || (e.touches && e.touches[0]?.clientY) || r.top  + r.height/2;
          const dx = (r.left + r.width/2) - mx, dy = (r.top + r.height/2) - my;
          const d  = Math.sqrt(dx*dx + dy*dy) || 1;
          btn.style.left = clampX(r.left + dx/d*160) + 'px';
          btn.style.top  = clampY(r.top  + dy/d*160) + 'px';
        }
        btn.addEventListener('mousemove', flee);
        btn.addEventListener('touchmove', flee, { passive: true });
        btn.onclick = e => e.preventDefault();
      }
    }

    // ──────────────────────────────────────────────
    // GIFTS
    // ──────────────────────────────────────────────
    let gifts = [];
    let giftsContainer = null;

    async function reloadGifts() {
      try { gifts = await api.guestGifts(); renderGifts(); } catch {}
    }

    function renderGifts() {
      if (!giftsContainer) return;
      const pickable    = gifts.filter(g =>  g.is_pickable);
      const notPickable = gifts.filter(g => !g.is_pickable);

      let html = '';

      // Общее (non-pickable) — shown without pick controls
      if (notPickable.length) {
        html += `<h3 style="margin:0 0 12px;color:#555">Общее</h3>
          <div class="gifts-grid mb-16">
            ${notPickable.map(g => `
              <div class="gift-card">
                <h4>${g.name}</h4>
                ${g.description ? `<div class="gift-desc">${g.description}</div>` : ''}
              </div>
            `).join('')}
          </div>`;
      }

      // Pickable gifts
      if (pickable.length) {
        if (notPickable.length) html += `<h3 style="margin:0 0 12px;color:#555">Выберите подарок</h3>`;
        html += `<div class="gifts-grid">
          ${pickable.map(g => {
            let cls = 'gift-card has-actions';
            let badge = '', pickBtn = '';
            if (g.is_my_pick) {
              cls += ' picked-by-me';
              badge   = '<span class="gift-badge" style="background:#d4edda;color:#155724">Ваш выбор</span>';
              pickBtn = `<button class="btn btn-secondary btn-sm mt-8" onclick="unpickGift(${g.id})">Отменить выбор</button>`;
            } else if (g.selected_by_guest_id) {
              cls += ' picked-by-other';
              badge = '<span class="gift-badge" style="background:#f8d7da;color:#721c24">Занят</span>';
            } else {
              pickBtn = `<button class="btn btn-success btn-sm mt-8" onclick="pickGift(${g.id})">Выбрать</button>`;
            }
            // Photo / link action bar
            const photoBtn = g.photo_filename
              ? `<button onclick="openGiftPhoto('/uploads/${g.photo_filename}')">📷 см. фото</button>`
              : `<button disabled>📷 см. фото</button>`;
            const linkBtn = g.link_url
              ? `<button onclick="window.open('${g.link_url}','_blank')">🔗 ссылка</button>`
              : `<button disabled>🔗 ссылка</button>`;
            return `<div class="${cls}" id="gift-${g.id}">
              <div class="gift-pick-area">
                ${badge}
                <h4>${g.name}</h4>
                ${g.description ? `<div class="gift-desc">${g.description}</div>` : ''}
                ${g.selected_by_name && !g.is_my_pick ? `<div class="gift-taken-by">Выбрал: ${g.selected_by_name}</div>` : ''}
                ${pickBtn}
              </div>
              <div class="gift-card-actions">
                ${photoBtn}${linkBtn}
              </div>
            </div>`;
          }).join('')}
        </div>`;
      }

      if (!html) html = '<p class="text-muted">Список подарков пуст</p>';
      giftsContainer.querySelector('.gifts-body').innerHTML = html;
    }

    function openGiftPhoto(src) {
      document.getElementById('gift-photo-img').src = src;
      document.getElementById('gift-photo-modal').style.display = 'flex';
    }
    function closeGiftPhoto() {
      document.getElementById('gift-photo-modal').style.display = 'none';
      document.getElementById('gift-photo-img').src = '';
    }

    // ──────────────────────────────────────────────
    // SECTION PHOTO ACCORDION GALLERY
    // ──────────────────────────────────────────────
    const _sgState  = {};  // sectionId → active index
    const _sgPhotos = {};  // sectionId → [{filename}]

    function buildSectionGallery(s) {
      _sgPhotos[s.id] = s.photos;
      if (!(s.id in _sgState)) _sgState[s.id] = 0;
      const idx  = _sgState[s.id];
      const cur  = s.photos[idx];
      const many = s.photos.length > 1;

      const thumbs = many ? s.photos.map((p, i) => `
        <div class="section-gallery-thumb ${i === idx ? 'active' : ''}"
             onclick="sgSetPhoto(${s.id},${i})">
          <img src="/uploads/${p.filename}" alt="" loading="lazy">
        </div>`).join('') : '';

      return `
        <div class="section-gallery" id="sg-${s.id}">
          <button class="section-gallery-toggle" onclick="sgToggle(${s.id})">
            📷 Фотографии (${s.photos.length})
            <span id="sg-arrow-${s.id}">▾</span>
          </button>
          <div class="section-gallery-body" id="sg-body-${s.id}" style="display:none">
            <div class="section-gallery-main">
              ${many ? `<button class="section-gallery-nav prev" onclick="sgPrev(${s.id})">&#8249;</button>` : ''}
              <img id="sg-img-${s.id}" src="/uploads/${cur.filename}" alt="" loading="lazy">
              <button class="section-gallery-zoom" onclick="openGiftPhoto('/uploads/${cur.filename}')"
                      id="sg-zoom-${s.id}">🔍</button>
              ${many ? `<button class="section-gallery-nav next" onclick="sgNext(${s.id})">&#8250;</button>` : ''}
            </div>
            ${many ? `<div class="section-gallery-thumbs">${thumbs}</div>` : ''}
          </div>
        </div>`;
    }

    function sgToggle(id) {
      const body  = document.getElementById(`sg-body-${id}`);
      const arrow = document.getElementById(`sg-arrow-${id}`);
      const open  = body.style.display === 'none';
      body.style.display = open ? '' : 'none';
      arrow.textContent  = open ? '▴' : '▾';
    }

    function sgSetPhoto(sId, idx) {
      _sgState[sId] = idx;
      const photos = _sgPhotos[sId] || [];
      const src    = '/uploads/' + photos[idx].filename;
      const img    = document.getElementById(`sg-img-${sId}`);
      const zoom   = document.getElementById(`sg-zoom-${sId}`);
      if (img)  { img.style.opacity = '.4'; img.src = src; img.onload = () => img.style.opacity = '1'; }
      if (zoom) { zoom.onclick = () => openGiftPhoto(src); }
      document.querySelectorAll(`#sg-body-${sId} .section-gallery-thumb`).forEach((t, i) =>
        t.classList.toggle('active', i === idx));
    }

    function sgPrev(sId) {
      const n = (_sgPhotos[sId] || []).length;
      sgSetPhoto(sId, (_sgState[sId] - 1 + n) % n);
    }
    function sgNext(sId) {
      const n = (_sgPhotos[sId] || []).length;
      sgSetPhoto(sId, (_sgState[sId] + 1) % n);
    }

    async function pickGift(id) {
      try { await api.pickGift(id); await reloadGifts(); } catch (e) { alert(e.message); }
    }
    async function unpickGift(id) {
      try { await api.unpickGift(id); await reloadGifts(); } catch (e) { alert(e.message); }
    }

    // ──────────────────────────────────────────────
    // FRIEND FORM AUTO-SAVE
    // ──────────────────────────────────────────────
    let friendForm       = null;
    let saveTimeout      = null;
    let cottagePicker    = null;
    let cottageArrivalDate = ''; // Fixed arrival date from admin settings

    function scheduleSave() {
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(saveFriendForm, 1500);
    }

    function showSaveStatus(ok) {
      let el = document.getElementById('save-status');
      if (!el) {
        el = document.createElement('div');
        el.id = 'save-status';
        el.style.cssText =
          'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);' +
          'padding:6px 18px;border-radius:20px;font-size:.82rem;z-index:3000;' +
          'pointer-events:none;transition:opacity .4s';
        document.body.appendChild(el);
      }
      clearTimeout(el._t);
      if (ok) {
        el.textContent = '✓ Сохранено';
        el.style.cssText += ';background:#dcfce7;color:#15803d;opacity:1';
      } else {
        el.textContent = '⚠ Не удалось сохранить';
        el.style.cssText += ';background:#fee2e2;color:#b91c1c;opacity:1';
      }
      el._t = setTimeout(() => { el.style.opacity = '0'; }, 2000);
    }

    async function saveFriendForm() {
      if (!friendForm) return;
      const going   = friendForm.querySelector('#going-cottage').checked;
      const toDate  = cottagePicker ? cottagePicker.getValue().to : '';
      const tourn   = friendForm.querySelector('#tournament').checked;
      const oppSel  = friendForm.querySelector('#preferred-opponent');
      const opp     = oppSel && oppSel.value ? parseInt(oppSel.value) : null;
      const comment = (document.getElementById('comment-text') || {}).value || '';
      try {
        await api.saveFriend({
          going_cottage:         going,
          cottage_date_from:     going ? (cottageArrivalDate || null) : null,
          cottage_date_to:       going ? (toDate || null)             : null,
          tournament:            tourn,
          preferred_opponent_id: opp,
          comment,
        });
        showSaveStatus(true);
      } catch (e) {
        console.error('saveFriend failed:', e);
        showSaveStatus(false);
      }
    }

    async function saveFamilyForm() {
      const responses = [];
      document.querySelectorAll('.loft-going').forEach(cb => {
        const gid       = parseInt(cb.dataset.guest);
        const going     = cb.checked;
        const tcb       = document.querySelector(`.loft-transport[data-guest="${cb.dataset.guest}"]`);
        const transport = going && !!(tcb && tcb.checked);
        responses.push({ guest_id: gid, going_loft: going, needs_transport: transport });
      });
      try {
        await api.saveFamily({ responses });
        showSaveStatus(true);
      } catch (e) {
        console.error('saveFamily failed:', e);
        showSaveStatus(false);
      }
    }

    // ──────────────────────────────────────────────
    // SCROLL REVEAL (fade-up on enter)
    // ──────────────────────────────────────────────
    function setupReveal() {
      const els = document.querySelectorAll('.invite-header, .invite-section');
      if (!('IntersectionObserver' in window)) {
        els.forEach(el => el.classList.add('reveal-in'));
        return;
      }
      const io = new IntersectionObserver((entries, obs) => {
        entries.forEach(e => {
          if (e.isIntersecting) { e.target.classList.add('reveal-in'); obs.unobserve(e.target); }
        });
      }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
      els.forEach((el, i) => {
        el.classList.add('reveal');
        el.style.setProperty('--reveal-delay', (Math.min(i, 6) * 60) + 'ms');
        io.observe(el);
      });
    }

    // ──────────────────────────────────────────────
    // RENDER PAGE
    // ──────────────────────────────────────────────
    async function renderPage(data) {
      const { guests, role, sections, friend_response: fr,
              family_responses: fmResponses,
              cottage_date_from, cottage_date_to, page_subtitle,
              header_text, footer_text } = data;

      // Store fixed arrival date for saving
      cottageArrivalDate = cottage_date_from || '';

      // Apply dynamic header / footer text
      if (header_text) {
        const logo = document.querySelector('header .logo');
        if (logo) logo.textContent = header_text;
      }
      if (footer_text) {
        const fp = document.querySelector('#page-footer p');
        if (fp) fp.textContent = footer_text;
      }

      document.getElementById('guest-name-header').textContent =
        guests.map(g => g.first_name).join(', ');

      const salutation = buildSalutation(guests);
      const subtitle   = page_subtitle || 'Вы приглашены на нашу свадьбу 💍';

      let html = `<div class="invite-page" id="invite-main">`;

      // Header
      html += `
        <div class="invite-header reveal">
          <span class="invite-eyebrow">Приглашение</span>
          <h1>${salutation}!</h1>
          <div class="invite-ornament" aria-hidden="true">
            <span class="line"></span><span class="dot">&#10022;</span><span class="line"></span>
          </div>
          <p class="subtitle">${subtitle}</p>
        </div>
      `;

      // Content sections
      for (const s of sections) {
        html += `<div class="invite-section">`;
        if (s.title)  html += `<h2>${s.title}</h2>`;
        if (s.content) html += `<div>${renderContent(s.content, guests)}</div>`;
        if (s.photos && s.photos.length) {
          html += buildSectionGallery(s);
        }
        html += `</div>`;
      }

      // ── Friends form ──
      if (role === 'friends') {
        const fd = fr || {};
        const arrivalLabel = cottage_date_from
          ? `<div style="margin-bottom:10px">
               <span style="font-weight:600;color:#444">Дата заезда:</span>
               <span style="color:#333;margin-left:6px">${formatDateRu(cottage_date_from)}</span>
             </div>`
          : '';

        html += `
        <div class="invite-section">
          <h2>📋 Ваши ответы</h2>
          <form class="guest-form" id="friend-form">

            <label class="option-card">
              <span class="option-icon">🏡</span>
              <span class="option-body">
                <span class="option-title">Еду в коттедж</span>
                <span class="option-desc">Загородный отдых с ночёвкой</span>
              </span>
              <input type="checkbox" id="going-cottage" class="option-input" ${fd.going_cottage ? 'checked' : ''}>
              <span class="option-check"></span>
            </label>

            <div id="cottage-dates-wrap" style="display:${fd.going_cottage ? 'block' : 'none'}">
              ${arrivalLabel}
              <label style="font-size:.85rem;color:#555;font-weight:bold;display:block;margin-bottom:8px">Выберите дату выезда</label>
              <div id="cottage-picker"></div>
            </div>

            <label class="option-card mt-16">
              <span class="option-icon">🏆</span>
              <span class="option-body">
                <span class="option-title">Участвую в турнире</span>
                <span class="option-desc">Дружеские соревнования</span>
              </span>
              <input type="checkbox" id="tournament" class="option-input" ${fd.tournament ? 'checked' : ''}>
              <span class="option-check"></span>
            </label>

            <div id="opponent-wrap" style="display:${fd.tournament ? 'block' : 'none'}">
              <div class="form-group">
                <label>Желаемый соперник в 1-м раунде</label>
                <select class="form-control" id="preferred-opponent">
                  <option value="">— без предпочтений —</option>
                </select>
              </div>
            </div>

          </form>
        </div>

        <div class="invite-section" id="gifts-section">
          <h2>🎁 Список подарков</h2>
          <p class="text-muted mb-16">Выберите подарок, который хотите подарить.</p>
          <div class="gifts-body"></div>
        </div>

        <div class="invite-section">
          <div class="form-group">
            <label>Комментарий</label>
            <textarea class="form-control" id="comment-text" rows="10"
              style="overflow:auto;resize:vertical"
              placeholder="Ваш комментарий...">${fd.comment || ''}</textarea>
          </div>
          ${fd.admin_reply && fd.admin_reply.trim() ? `
          <div class="host-reply">
            <div class="host-reply-head">💌 Ответ организаторов</div>
            <div class="host-reply-text">${escapeHtml(fd.admin_reply)}</div>
          </div>` : ''}
        </div>

        <div class="gosha-btn-wrap">
          <button class="gosha-btn" id="gosha-btn">Я ГОША</button>
        </div>`;
      }

      // ── Family form (per-guest — each member answers separately) ──
      if (role === 'family') {
        const responses = fmResponses || {};
        const multi = guests.length > 1;
        const peopleHtml = guests.map(g => {
          const resp  = responses[g.id] || {};
          const going = !!resp.going_loft;
          const transp = !!resp.needs_transport;
          const name  = [g.first_name, g.last_name].filter(Boolean).join(' ');
          return `
            <div class="rsvp-person">
              ${multi ? `<div class="rsvp-person-name">${name}</div>` : ''}
              <label class="option-card">
                <span class="option-icon">🏙</span>
                <span class="option-body">
                  <span class="option-title">Еду в лофт</span>
                  <span class="option-desc">Празднование в лофте</span>
                </span>
                <input type="checkbox" class="option-input loft-going" data-guest="${g.id}" ${going ? 'checked' : ''}>
                <span class="option-check"></span>
              </label>
              <div class="transport-wrap" data-guest="${g.id}" style="display:${going ? 'block' : 'none'}">
                <label class="option-card">
                  <span class="option-icon">🚌</span>
                  <span class="option-body">
                    <span class="option-title">Нужен транспорт до лофта</span>
                    <span class="option-desc">Организованный трансфер</span>
                  </span>
                  <input type="checkbox" class="option-input loft-transport" data-guest="${g.id}" ${transp ? 'checked' : ''}>
                  <span class="option-check"></span>
                </label>
              </div>
            </div>`;
        }).join('');

        html += `
        <div class="invite-section">
          <h2>📋 Ваши ответы</h2>
          ${multi ? '<p class="text-muted mb-16">Отметьте, пожалуйста, ответ для каждого гостя.</p>' : ''}
          <div class="rsvp-people">${peopleHtml}</div>
        </div>

        <div class="invite-section" id="gifts-section">
          <h2>🎁 Список подарков</h2>
          <p class="text-muted mb-16">Выберите подарок, который хотите подарить.</p>
          <div class="gifts-body"></div>
        </div>`;
      }

      html += `</div>`; // invite-page
      document.getElementById('page-content').innerHTML = html;

      // Entrance animations
      setupReveal();

      // ── Post-render wiring ──

      if (role === 'friends') {
        friendForm    = document.getElementById('friend-form');
        giftsContainer = document.getElementById('gifts-section');

        // Cottage picker — fixed arrival, guest picks only departure
        if (cottage_date_from) {
          const cottagePickerEl = document.getElementById('cottage-picker');
          cottagePicker = new DateRangePicker(cottagePickerEl, {
            min:       cottage_date_from,
            max:       cottage_date_to   || undefined,
            fixedFrom: cottage_date_from,                     // arrival is fixed
            to:        fr && fr.cottage_date_to ? fr.cottage_date_to : '',
            labelTo:   'Дата выезда',
            onChange:  () => scheduleSave(),
          });
        }

        // Cottage toggle
        const goingCottage = document.getElementById('going-cottage');
        const cottageDates  = document.getElementById('cottage-dates-wrap');
        goingCottage.addEventListener('change', () => {
          cottageDates.style.display = goingCottage.checked ? 'block' : 'none';
          scheduleSave();
        });

        // Tournament toggle
        const tourn   = document.getElementById('tournament');
        const oppWrap = document.getElementById('opponent-wrap');
        tourn.addEventListener('change', () => {
          oppWrap.style.display = tourn.checked ? 'block' : 'none';
          scheduleSave();
        });

        // Load friends list for opponent selector
        try {
          const friends = await api.friendsList();
          const sel = document.getElementById('preferred-opponent');
          friends.forEach(f => {
            const opt = document.createElement('option');
            opt.value = f.id;
            opt.textContent = [f.last_name, f.first_name, f.middle_name].filter(Boolean).join(' ');
            if (fr && fr.preferred_opponent_id === f.id) opt.selected = true;
            sel.appendChild(opt);
          });
          sel.addEventListener('change', scheduleSave);
        } catch {}

        document.getElementById('comment-text').addEventListener('input', scheduleSave);
        document.getElementById('going-cottage').addEventListener('change', scheduleSave);
        document.getElementById('tournament').addEventListener('change', scheduleSave);

        // Gifts
        await reloadGifts();

        // Gosha button
        goshaBtnBehavior(document.getElementById('gosha-btn'), guests.some(g => g.am_i_gosha));
      }

      if (role === 'family') {
        // Per-guest loft toggle reveals that guest's transport option
        document.querySelectorAll('.loft-going').forEach(cb => {
          cb.addEventListener('change', () => {
            const tw = document.querySelector(`.transport-wrap[data-guest="${cb.dataset.guest}"]`);
            if (tw) tw.style.display = cb.checked ? 'block' : 'none';
            saveFamilyForm();
          });
        });
        document.querySelectorAll('.loft-transport').forEach(cb =>
          cb.addEventListener('change', saveFamilyForm));

        // Gifts for family
        giftsContainer = document.getElementById('gifts-section');
        await reloadGifts();
      }

      // Music
      if (getToken()) await initMusic();
    }

    // ──────────────────────────────────────────────
    // INIT
    // ──────────────────────────────────────────────
    async function init() {
      const params = new URLSearchParams(window.location.search);
      const token  = params.get('token');

      if (token) {
        // Public token — open without login
        try {
          const data = await api.invite(token);
          if (data.error) {
            document.getElementById('page-content').innerHTML =
              `<div style="text-align:center;padding:60px;color:#c00">${data.error}</div>`;
            return;
          }
          // Store guest JWT so authenticated API calls (gifts, forms) work correctly
          if (data.guest_token) {
            setAuth(data.guest_token, data.role, data.guest_id);
          }
          await renderPage(data);
        } catch (err) {
          document.getElementById('page-content').innerHTML =
            `<div style="text-align:center;padding:60px;color:#c00">Ошибка: ${err.message}</div>`;
        }
      } else {
        requireGuest();
        document.getElementById('page-content').innerHTML = `
          <div style="text-align:center;padding:60px;color:#888">
            <p>Используйте ссылку-приглашение, отправленную вам.</p>
          </div>`;
      }
    }

    init();
  </script>
</body>
</html>

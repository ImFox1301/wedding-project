<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ссылки-приглашения — Админ</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 16px;
    }

    .link-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
      transition: box-shadow .15s;
    }
    .link-card:hover {
      box-shadow: 0 3px 10px rgba(0,0,0,.09);
    }

    .link-card-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .link-card-icon {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .link-card-icon.guest-icon { background: #eff6ff; }
    .link-card-icon.group-icon { background: #f0fdf4; }

    .link-card-meta {
      flex: 1;
      min-width: 0;
    }
    .link-card-name {
      font-weight: 600;
      font-size: 1rem;
      color: #1e293b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .link-card-sub {
      font-size: .78rem;
      color: #94a3b8;
      margin-top: 2px;
    }

    .link-card-url {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 7px;
      padding: 8px 10px;
    }
    .link-card-url span {
      flex: 1;
      font-size: .78rem;
      color: #475569;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: monospace;
    }
    .link-card-url button {
      flex-shrink: 0;
      background: none;
      border: 1px solid #cbd5e1;
      border-radius: 5px;
      padding: 3px 10px;
      font-size: .75rem;
      color: #475569;
      cursor: pointer;
      transition: background .12s, color .12s;
      white-space: nowrap;
    }
    .link-card-url button:hover {
      background: #e2e8f0;
    }
    .link-card-url button.copied {
      background: #dcfce7;
      border-color: #86efac;
      color: #16a34a;
    }

    .link-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .link-card-date {
      font-size: .78rem;
      color: #94a3b8;
    }

    .link-section-title {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #94a3b8;
      margin: 0 0 10px 0;
    }

    .links-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 48px 0;
      color: #94a3b8;
      font-size: .9rem;
    }

    .section-block { margin-bottom: 32px; }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="/admin/">💍 Свадьба — Админ</a>
    <div class="user-info"><button class="btn-logout" onclick="logout()">Выйти</button></div>
  </header>

  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-section">Гости</div>
      <a href="/admin/guests.html">Гости</a>
      <a href="/admin/groups.html">Группы</a>
      <a href="/admin/links.html" class="active">Ссылки-приглашения</a>
      <div class="sidebar-section">Контент</div>
      <a href="/admin/editor.html">Редактор страниц</a>
      <a href="/admin/gifts.html">Подарки</a>
      <a href="/admin/music.html">Музыка</a>
      <div class="sidebar-section">Аналитика</div>
      <a href="/admin/stats.html">Статистика</a>
      <div class="sidebar-section">Прочее</div>
      <a href="/admin/settings.html">Настройки</a>
    </nav>

    <main class="content">
      <div class="flex align-center justify-between mb-16">
        <h1>Ссылки-приглашения</h1>
        <button class="btn btn-primary" onclick="openModal()">+ Создать ссылку</button>
      </div>
      <div id="alert-container"></div>

      <div id="links-container"></div>
    </main>
  </div>

  <footer><p>Панель администратора</p></footer>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Создать ссылку-приглашение</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <form id="link-form">
        <div class="form-group">
          <label>Тип ссылки</label>
          <select class="form-control" id="link-type" onchange="onTypeChange()">
            <option value="guest">Для одного гостя</option>
            <option value="group">Для группы</option>
          </select>
        </div>
        <div class="form-group" id="guest-select-wrap">
          <label>Гость</label>
          <select class="form-control" id="link-guest"></select>
        </div>
        <div class="form-group hidden" id="group-select-wrap">
          <label>Группа</label>
          <select class="form-control" id="link-group"></select>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Отмена</button>
          <button type="submit" class="btn btn-primary">Создать</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    requireAdmin();
    function logout() { clearAuth(); window.location.href = '/login.html'; }

    function getBase() {
      return window.location.origin;
    }

    async function load() {
      try {
        const [available, links] = await Promise.all([
          api.links.available(),
          api.links.list(),
        ]);
        fillSelects(available);
        renderLinks(links);
      } catch (err) {
        showAlert(document.getElementById('alert-container'), err.message, 'danger');
      }
    }

    function fillSelects(available) {
      const guestSel = document.getElementById('link-guest');
      guestSel.innerHTML = available.guests.length
        ? available.guests.map(g =>
            `<option value="${g.id}">${g.last_name} ${g.first_name} (${g.role === 'friends' ? 'Друзья' : 'Семья'})</option>`
          ).join('')
        : '<option disabled>Нет доступных гостей</option>';

      const groupSel = document.getElementById('link-group');
      groupSel.innerHTML = available.groups.length
        ? available.groups.map(g => `<option value="${g.id}">${g.name}</option>`).join('')
        : '<option disabled>Нет доступных групп</option>';
    }

    function onTypeChange() {
      const type = document.getElementById('link-type').value;
      document.getElementById('guest-select-wrap').classList.toggle('hidden', type !== 'guest');
      document.getElementById('group-select-wrap').classList.toggle('hidden', type !== 'group');
    }

    function fmtDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('ru', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function buildCard(l) {
      const url  = `${getBase()}/invite.html?token=${l.token}`;
      const isGroup = !!l.group_id;

      let name = '—';
      if (l.last_name) name = `${l.last_name} ${l.first_name}${l.middle_name ? ' ' + l.middle_name : ''}`;
      else if (l.group_name) name = l.group_name;

      const iconClass = isGroup ? 'group-icon' : 'guest-icon';
      const icon      = isGroup ? '👥' : '👤';
      const typeLabel = isGroup ? 'Группа' : 'Гость';

      return `
        <div class="link-card" id="link-card-${l.id}">
          <div class="link-card-header">
            <div class="link-card-icon ${iconClass}">${icon}</div>
            <div class="link-card-meta">
              <div class="link-card-name">${name}</div>
              <div class="link-card-sub">${typeLabel} · создана ${fmtDate(l.created_at)}</div>
            </div>
          </div>

          <div class="link-card-url">
            <span title="${url}">${url}</span>
            <button id="copy-btn-${l.id}" onclick="copyLink('${url}', ${l.id})">Копировать</button>
          </div>

          <div class="link-card-footer">
            <span></span>
            <button class="btn btn-danger btn-sm" onclick="deleteLink(${l.id})">🗑 Удалить</button>
          </div>
        </div>
      `;
    }

    function renderLinks(links) {
      const container = document.getElementById('links-container');

      if (!links.length) {
        container.innerHTML = `
          <div class="links-grid">
            <div class="links-empty">Ссылок пока нет. Создайте первую!</div>
          </div>`;
        return;
      }

      const guests = links.filter(l => l.guest_id);
      const groups = links.filter(l => l.group_id);

      let html = '';

      if (groups.length) {
        html += `<div class="section-block">
          <p class="link-section-title">Групповые ссылки — ${groups.length}</p>
          <div class="links-grid">${groups.map(buildCard).join('')}</div>
        </div>`;
      }

      if (guests.length) {
        html += `<div class="section-block">
          <p class="link-section-title">Личные ссылки — ${guests.length}</p>
          <div class="links-grid">${guests.map(buildCard).join('')}</div>
        </div>`;
      }

      container.innerHTML = html;
    }

    async function copyLink(url, id) {
      await navigator.clipboard.writeText(url);
      const btn = document.getElementById(`copy-btn-${id}`);
      if (!btn) return;
      btn.textContent = '✓ Скопировано';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Копировать';
        btn.classList.remove('copied');
      }, 2000);
    }

    function openModal() {
      document.getElementById('modal').classList.add('active');
      onTypeChange();
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }

    async function deleteLink(id) {
      if (!confirmDialog('Удалить ссылку?')) return;
      try {
        await api.links.delete(id);
        const links = await api.links.list();
        renderLinks(links);
        showAlert(document.getElementById('alert-container'), 'Ссылка удалена');
      } catch (err) {
        showAlert(document.getElementById('alert-container'), err.message, 'danger');
      }
    }

    document.getElementById('link-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const type = document.getElementById('link-type').value;
      const data = type === 'guest'
        ? { guest_id: parseInt(document.getElementById('link-guest').value) }
        : { group_id: parseInt(document.getElementById('link-group').value) };
      try {
        await api.links.create(data);
        closeModal();
        const [available, links] = await Promise.all([api.links.available(), api.links.list()]);
        fillSelects(available);
        renderLinks(links);
        showAlert(document.getElementById('alert-container'), 'Ссылка создана');
      } catch (err) {
        showAlert(document.getElementById('alert-container'), err.message, 'danger');
      }
    });

    load();
  </script>
</body>
</html>

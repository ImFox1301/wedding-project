<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Подарки — Админ</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .gifts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .gift-admin-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
      transition: box-shadow .15s;
    }
    .gift-admin-card:hover { box-shadow: 0 3px 10px rgba(0,0,0,.09); }
    .gift-admin-card-header { display: flex; align-items: flex-start; gap: 10px; }
    .gift-admin-thumb {
      width: 48px; height: 48px;
      border-radius: 7px; object-fit: cover;
      border: 1px solid #e2e8f0; flex-shrink: 0;
    }
    .gift-admin-thumb-placeholder {
      width: 48px; height: 48px;
      border-radius: 7px; background: #f1f5f9;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .gift-admin-meta { flex: 1; min-width: 0; }
    .gift-admin-name {
      font-weight: 600; font-size: .93rem; color: #1e293b;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .gift-admin-desc {
      font-size: .78rem; color: #64748b; margin-top: 2px;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .gift-admin-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .gift-tag {
      font-size: .7rem; padding: 2px 7px; border-radius: 4px;
      font-weight: 600; background: #f1f5f9; color: #475569;
    }
    .gift-tag.pickable { background: #dcfce7; color: #15803d; }
    .gift-tag.picked   { background: #fef9c3; color: #854d0e; }
    .gift-tag.has-link { background: #eff6ff; color: #1d4ed8; }
    .gift-admin-footer {
      display: flex; align-items: center;
      justify-content: flex-end; gap: 6px; margin-top: auto;
    }
    .section-title-label {
      font-size: .7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: #94a3b8; margin: 0 0 10px;
    }
    .section-block { margin-bottom: 32px; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap">
</head>
<body class="admin-body">
  <header>
    <a class="logo" href="/admin/">💍 Свадьба — Админ</a>
    <div class="user-info"><button class="btn-logout" onclick="logout()">Выйти</button></div>
  </header>

  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-section">Гости</div>
      <a href="/admin/guests.html">Гости</a>
      <a href="/admin/groups.html">Группы</a>
      <a href="/admin/links.html">Ссылки-приглашения</a>
      <div class="sidebar-section">Контент</div>
      <a href="/admin/editor.html">Редактор страниц</a>
      <a href="/admin/personal-sections.html">Персональные разделы</a>
      <a href="/admin/gifts.html" class="active">Подарки</a>
      <a href="/admin/music.html">Музыка</a>
      <div class="sidebar-section">Аналитика</div>
      <a href="/admin/stats.html">Статистика</a>
      <a href="/admin/comments.html">Комментарии</a>
      <a href="/admin/chat.html">Чат</a>
      <div class="sidebar-section">Прочее</div>
      <a href="/admin/settings.html">Настройки</a>
    </nav>

    <main class="content">
      <div class="flex align-center justify-between mb-16">
        <h1>Подарки</h1>
        <button class="btn btn-primary" onclick="openModal()">+ Добавить подарок</button>
      </div>
      <div id="alert-container"></div>
      <div id="gifts-container"></div>
    </main>
  </div>

  <footer><p>Панель администратора</p></footer>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal" style="max-width:540px">
      <div class="modal-header">
        <h2 id="modal-title">Добавить подарок</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <form id="gift-form">
        <input type="hidden" id="gift-id">
        <div class="form-group">
          <label>Название *</label>
          <input type="text" class="form-control" id="gift-name" required>
        </div>
        <div class="form-group">
          <label>Описание</label>
          <textarea class="form-control" id="gift-desc" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label>Список</label>
          <select class="form-control" id="gift-role" onchange="onRoleChange()">
            <option value="friends">Друзья</option>
            <option value="family">Семья</option>
          </select>
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="gift-pickable" checked onchange="togglePickableFields()">
            <span>is_pickable (гость может выбрать)</span>
          </label>
        </div>
        <div id="pickable-fields">
          <div class="form-group">
            <label>Ссылка</label>
            <input type="url" class="form-control" id="gift-link" placeholder="https://...">
          </div>
          <div class="form-group">
            <label>Фото</label>
            <div id="current-photo-wrap" style="display:none;margin-bottom:8px">
              <img id="current-photo-img" src="" alt="Текущее фото"
                style="max-width:100%;max-height:160px;border-radius:6px;display:block;margin-bottom:6px">
              <button type="button" class="btn btn-danger btn-sm" onclick="removePhoto()">🗑 Удалить фото</button>
            </div>
            <input type="file" class="form-control" id="gift-photo" accept="image/*">
            <small class="text-muted">JPG, PNG, WEBP, GIF. Загрузится после сохранения.</small>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Отмена</button>
          <button type="submit" class="btn btn-primary">Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    requireAdmin();
    function logout() { clearAuth(); window.location.href = '/login.html'; }

    async function load() {
      try {
        const gifts = await api.gifts.list();
        const friends = gifts.filter(g => g.role === 'friends');
        const family  = gifts.filter(g => g.role === 'family');
        renderAll(friends, family);
      } catch (err) {
        showAlert(document.getElementById('alert-container'), err.message, 'danger');
      }
    }

    function renderAll(friends, family) {
      const c = document.getElementById('gifts-container');
      let html = '';
      if (friends.length) html += renderSection('🎁 Список для друзей', friends);
      if (family.length)  html += renderSection('🎁 Список для семьи',  family);
      if (!html) html = '<p class="text-muted">Подарков нет. Добавьте первый!</p>';
      c.innerHTML = html;
    }

    function renderSection(title, gifts) {
      return `
        <div class="section-block">
          <p class="section-title-label">${title} — ${gifts.length}</p>
          <div class="gifts-grid">${gifts.map(buildCard).join('')}</div>
        </div>`;
    }

    function buildCard(g) {
      const thumb = g.photo_filename
        ? `<img class="gift-admin-thumb" src="/uploads/${g.photo_filename}" alt="">`
        : `<div class="gift-admin-thumb-placeholder">🎁</div>`;
      const tags = [];
      if (g.is_pickable) tags.push(`<span class="gift-tag pickable">✓ Выбираемый</span>`);
      if (g.link_url)    tags.push(`<span class="gift-tag has-link">🔗 Ссылка</span>`);
      return `
        <div class="gift-admin-card">
          <div class="gift-admin-card-header">
            ${thumb}
            <div class="gift-admin-meta">
              <div class="gift-admin-name">${g.name}</div>
              ${g.description ? `<div class="gift-admin-desc">${g.description}</div>` : ''}
            </div>
          </div>
          ${tags.length ? `<div class="gift-admin-tags">${tags.join('')}</div>` : ''}
          ${g.givers ? `<div style="font-size:.78rem;color:#475569;background:#f1f5f9;border-radius:6px;padding:5px 8px">🎁 Дарят: ${g.givers}</div>` : ''}
          <div class="gift-admin-footer">
            <button class="btn btn-secondary btn-sm" onclick='editGift(${JSON.stringify(g)})'>✏️ Изменить</button>
            <button class="btn btn-danger btn-sm" onclick="deleteGift(${g.id}, '${g.name.replace(/'/g, "\\'")}')">🗑</button>
          </div>
        </div>`;
    }

    function onRoleChange() {
      const isFamily = document.getElementById('gift-role').value === 'family';
      const cb = document.getElementById('gift-pickable');
      if (isFamily) {
        cb.checked = false;
        cb.disabled = true;
      } else {
        // Switching back to "Друзья": re-enable and restore the pickable state
        // (family forces it off), so the friends-only fields appear again.
        if (cb.disabled) cb.checked = true;
        cb.disabled = false;
      }
      togglePickableFields();
    }

    function togglePickableFields() {
      const pickable = document.getElementById('gift-pickable').checked;
      document.getElementById('pickable-fields').style.display = pickable ? '' : 'none';
    }

    function openModal(gift = null) {
      document.getElementById('modal-title').textContent = gift ? 'Редактировать подарок' : 'Добавить подарок';
      document.getElementById('gift-id').value   = gift ? gift.id : '';
      document.getElementById('gift-name').value = gift ? gift.name : '';
      document.getElementById('gift-desc').value = gift ? (gift.description || '') : '';
      document.getElementById('gift-role').value = gift ? gift.role : 'friends';
      document.getElementById('gift-pickable').checked  = gift ? gift.is_pickable : true;
      document.getElementById('gift-pickable').disabled = false;
      document.getElementById('gift-link').value = gift ? (gift.link_url || '') : '';
      document.getElementById('gift-photo').value = '';
      const photoWrap = document.getElementById('current-photo-wrap');
      const photoImg  = document.getElementById('current-photo-img');
      if (gift && gift.photo_filename) {
        photoImg.src = '/uploads/' + gift.photo_filename;
        photoWrap.style.display = '';
      } else {
        photoWrap.style.display = 'none';
      }
      onRoleChange();
      document.getElementById('modal').classList.add('active');
    }

    function closeModal() { document.getElementById('modal').classList.remove('active'); }
    function editGift(g)  { openModal(g); }

    async function removePhoto() {
      const id = document.getElementById('gift-id').value;
      if (!id) return;
      try {
        await api.gifts.deletePhoto(id);
        document.getElementById('current-photo-wrap').style.display = 'none';
        document.getElementById('current-photo-img').src = '';
        await load();
      } catch (err) {
        showAlert(document.getElementById('alert-container'), err.message, 'danger');
      }
    }

    async function deleteGift(id, name) {
      if (!confirmDialog(`Удалить подарок «${name}»?`)) return;
      try {
        await api.gifts.delete(id);
        await load();
        showAlert(document.getElementById('alert-container'), 'Подарок удалён');
      } catch (err) {
        showAlert(document.getElementById('alert-container'), err.message, 'danger');
      }
    }

    document.getElementById('gift-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('gift-id').value;
      const isPickable = document.getElementById('gift-pickable').checked;
      const data = {
        name:        document.getElementById('gift-name').value.trim(),
        description: document.getElementById('gift-desc').value.trim(),
        role:        document.getElementById('gift-role').value,
        is_pickable: isPickable,
        link_url:    isPickable ? document.getElementById('gift-link').value.trim() : '',
      };
      try {
        let giftId = id;
        if (id) { await api.gifts.update(id, data); }
        else    { const res = await api.gifts.create(data); giftId = res.id; }
        if (isPickable && giftId) {
          const fileInput = document.getElementById('gift-photo');
          if (fileInput.files && fileInput.files[0]) {
            const form = new FormData();
            form.append('photo', fileInput.files[0]);
            await api.gifts.uploadPhoto(giftId, form);
          }
        }
        closeModal();
        await load();
        showAlert(document.getElementById('alert-container'), id ? 'Подарок обновлён' : 'Подарок добавлен');
      } catch (err) {
        showAlert(document.getElementById('alert-container'), err.message, 'danger');
      }
    });

    load();
  </script>
</body>
</html>

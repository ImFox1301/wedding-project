version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wedding}
      POSTGRES_USER: ${POSTGRES_USER:-wedding}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wedding_secret}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wedding}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-wedding}:${POSTGRES_PASSWORD:-wedding_secret}@db:5432/${POSTGRES_DB:-wedding}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      ADMIN_LOGIN: ${ADMIN_LOGIN:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      PORT: "8080"
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend
    environment:
      APP_HOST: ${APP_HOST:-localhost}
    volumes:
      - uploads:/uploads:ro
    # Port is NOT exposed to host — Caddy proxies to this container

  caddy:
    image: caddy:2-alpine
    restart: always
    depends_on:
      - frontend
    environment:
      APP_HOST: ${APP_HOST:-localhost}
      SERVER_IP: ${SERVER_IP:-0.0.0.0}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pg_data:
  uploads:
  caddy_data:
  caddy_config:

version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wedding}
      POSTGRES_USER: ${POSTGRES_USER:-wedding}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wedding_secret}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wedding}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-wedding}:${POSTGRES_PASSWORD:-wedding_secret}@db:5432/${POSTGRES_DB:-wedding}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      ADMIN_LOGIN: ${ADMIN_LOGIN:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      PORT: "8080"
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend
    environment:
      APP_HOST: ${APP_HOST:-localhost}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - uploads:/uploads:ro

volumes:
  pg_data:
  uploads:
